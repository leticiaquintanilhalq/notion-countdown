<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    width: 100vw;
    height: 100vh;
}

#timer {
    font-family: Arial, sans-serif;
    color: white;
    font-size: 5rem;
    font-weight: 700;
}
</style>
</head>

<body>

<div id="timer">
    D-<span id="days"></span>
</div>

<script>
const targetDate = new Date('December 13, 2026 00:00:00');

function updateCountdown() {
    const now = new Date().getTime();
    const diff = targetDate - now;

    const days = Math.max(
        0,
        Math.floor(diff / (1000 * 60 * 60 * 24))
    );

    document.getElementById('days').textContent = days;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
