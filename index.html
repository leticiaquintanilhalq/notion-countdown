<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
}

body {
    display: inline-block;
}

#timer {
    font-family: Arial, sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: black; /* change to white later if needed */
    line-height: 1;
    display: inline-block;
    white-space: nowrap;
}
</style>
</head>

<body>

<div id="timer">
    <span id="days"></span>d
</div>

<script>
const targetDate = new Date('December 13, 2026 00:00:00');

function updateCountdown() {
    const now = new Date().getTime();
    const diff = targetDate - now;

    const days = Math.max(
        0,
        Math.floor(diff / (1000 * 60 * 60 * 24))
    );

    document.getElementById('days').textContent = days;
}

updateCountdown();
setInterval(updateCountdown, 60000);
</script>

</body>
</html>
